<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blade LQ/PC Master</title>

<style>

body{
margin:0;
font-family:Arial;
}

.content{
margin-left:270px;
padding:40px;
}

input{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:6px 15px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

table,th,td{
border:1px solid #bdbdbd;
}

th{
background:#9ec9dd;
}

th,td{
padding:10px;
text-align:center;
}

.action-btn{
padding:5px 10px;
margin:2px;
}

</style>
</head>

<body>

<div class="content">

<h1>BLADE LQ / PC MASTER</h1>

<label>Enter LQ / PC</label>
<input type="text" id="lqpcName" placeholder="Enter LQ or PC">

<button onclick="saveLQPC()">Save</button>

<hr>

<label>Search</label>
<input type="text" id="searchInput" onkeyup="searchLQPC()" placeholder="Search...">

<br><br>

<table>

<thead>
<tr>
<th>ID</th>
<th>LQ / PC</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="lqpcTable"></tbody>

</table>

</div>

<script>

let editId=null;

/* LOAD */

function loadLQPC(){

fetch('/api/blade_lqpc')
.then(res=>res.json())
.then(data=>{

const table=document.getElementById("lqpcTable");

table.innerHTML="";

data.forEach(item=>{

table.innerHTML+=`
<tr>
<td>${item.id}</td>
<td>${item.lqpc_name}</td>
<td>
<button class="action-btn" onclick="setEdit(${item.id},'${item.lqpc_name}')">Edit</button>
<button class="action-btn" onclick="deleteLQPC(${item.id})">Delete</button>
</td>
</tr>
`;

});

});

}

/* SAVE */

function saveLQPC(){

const name=document.getElementById("lqpcName").value.trim();

if(!name){
alert("Enter value");
return;
}

if(editId===null){

fetch('/api/blade_lqpc',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({lqpc_name:name})
})
.then(()=>{
document.getElementById("lqpcName").value="";
loadLQPC();
});

}

else{

fetch(`/api/blade_lqpc/${editId}`,{
method:'PUT',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({lqpc_name:name})
})
.then(()=>{
editId=null;
document.getElementById("lqpcName").value="";
loadLQPC();
});

}

}

/* EDIT */

function setEdit(id,name){
editId=id;
document.getElementById("lqpcName").value=name;
}

/* DELETE */

function deleteLQPC(id){

if(!confirm("Delete this value?")) return;

fetch(`/api/blade_lqpc/${id}`,{
method:'DELETE'
})
.then(loadLQPC);

}

/* SEARCH */

function searchLQPC(){

const keyword=document.getElementById("searchInput").value.toLowerCase();

const rows=document.querySelectorAll("#lqpcTable tr");

rows.forEach(row=>{

const text=row.innerText.toLowerCase();

row.style.display=text.includes(keyword) ? "" : "none";

});

}

loadLQPC();

</script>

</body>
</html>
