<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blade PL/DX Master</title>

<style>

body{
margin:0;
font-family:Arial;
}

.sidebar{
width:260px;
height:100vh;
background:#b3e5fc;
position:fixed;
left:0;
top:0;
padding-top:20px;
}

.menu-item{
padding:12px 20px;
cursor:pointer;
font-weight:bold;
}

.menu-item:hover{
background:#81d4fa;
}

.submenu{
display:none;
padding-left:15px;
}

.submenu div{
padding:10px 20px;
cursor:pointer;
}

.submenu div:hover{
background:#4fc3f7;
color:white;
}

.content{
margin-left:270px;
padding:40px;
}

input{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:6px 15px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

table,th,td{
border:1px solid #bdbdbd;
}

th{
background:#9ec9dd;
}

th,td{
padding:10px;
text-align:center;
}

.action-btn{
padding:5px 10px;
margin:2px;
}

</style>
</head>

<body>

<div class="content">

<h1>BLADE PL/DX MASTER</h1>

<label>Enter PL/DX</label>
<input type="text" id="pldxName" placeholder="Enter PL or DX">

<button onclick="savePLDX()">Save</button>

<hr>

<label>Search</label>
<input type="text" id="searchInput" onkeyup="searchPLDX()" placeholder="Search...">

<br><br>

<table>

<thead>
<tr>
<th>ID</th>
<th>PL/DX</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="pldxTable"></tbody>

</table>

</div>

<script>

let editId=null;

/* LOAD */

function loadPLDX(){

fetch('/api/blade_pldx')
.then(res=>res.json())
.then(data=>{

const table=document.getElementById("pldxTable");

table.innerHTML="";

data.forEach(item=>{

table.innerHTML+=`
<tr>
<td>${item.id}</td>
<td>${item.pldx_name}</td>
<td>
<button class="action-btn" onclick="setEdit(${item.id},'${item.pldx_name}')">Edit</button>
<button class="action-btn" onclick="deletePLDX(${item.id})">Delete</button>
</td>
</tr>
`;

});

});

}

/* SAVE */

function savePLDX(){

const name=document.getElementById("pldxName").value.trim();

if(!name){
alert("Enter Value");
return;
}

if(editId===null){

fetch('/api/blade_pldx',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({pldx_name:name})
})
.then(()=>{
document.getElementById("pldxName").value="";
loadPLDX();
});

}

else{

fetch(`/api/blade_pldx/${editId}`,{
method:'PUT',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({pldx_name:name})
})
.then(()=>{
editId=null;
document.getElementById("pldxName").value="";
loadPLDX();
});

}

}

/* EDIT */

function setEdit(id,name){
editId=id;
document.getElementById("pldxName").value=name;
}

/* DELETE */

function deletePLDX(id){

if(!confirm("Delete this value?")) return;

fetch(`/api/blade_pldx/${id}`,{
method:'DELETE'
})
.then(loadPLDX);

}

/* SEARCH */

function searchPLDX(){

const keyword=document.getElementById("searchInput").value.toLowerCase();

const rows=document.querySelectorAll("#pldxTable tr");

rows.forEach(row=>{

const text=row.innerText.toLowerCase();

row.style.display=text.includes(keyword) ? "" : "none";

});

}

loadPLDX();

</script>

</body>
</html>
