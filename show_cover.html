<!DOCTYPE html>
<html>
<head>
<title>Show Cover Vouchers</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:20px
}

h2{
margin-top:0;
}

.top-bar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

button{
padding:8px 14px;
border:none;
cursor:pointer;
font-weight:bold;
}

.report-btn{
background:#673ab7;
color:white;
}

.voucher{
background:white;
padding:20px;
margin-bottom:30px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center
}

th{
background:#2196f3;
color:white
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-weight:bold;
flex-wrap:wrap;
gap:15px;
}

.total{
font-weight:bold;
background:#f0f0f0
}

.actions{
margin-top:15px;
display:flex;
gap:10px;
}

.edit-btn{
background:#4caf50;
color:white;
}

.delete-btn{
background:#f44336;
color:white;
}

#finalTotalBox{
margin-top:20px;
padding:12px;
background:#e8f5e9;
font-weight:bold;
font-size:16px;
border-radius:5px;
}

/* ===== MODAL ===== */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
width:350px;
border-radius:6px;
}

.modal-content input,
.modal-content select{
width:100%;
padding:8px;
margin-bottom:10px;
}

.generate-btn{
background:#2196f3;
color:white;
width:100%;
}

.close-btn{
background:#f44336;
color:white;
width:100%;
margin-top:5px;
}
</style>
</head>

<body>

<h2>All Cover Vouchers</h2>

<div class="top-bar">
<button class="report-btn" onclick="openModal()">Reports</button>
</div>

<div id="voucherContainer"></div>
<div id="finalTotalBox"></div>

<!-- REPORT MODAL -->
<div class="modal" id="reportModal">
<div class="modal-content">
<h3>Select Report</h3>

<label>From Date</label>
<input type="date" id="fromDate">

<label>To Date</label>
<input type="date" id="toDate">

<label>Report Type</label>
<select id="reportType">
<option value="">Select Report</option>
<option value="packing">Packing Report</option>
<option value="painting">Painting Report</option>
<option value="powdering">Powdering Report</option>
</select>

<button class="generate-btn" onclick="generateReport()">Generate Report</button>
<button class="close-btn" onclick="closeModal()">Close</button>

</div>
</div>

<script>

let allVoucherTotals = []

async function loadVouchers(){

const response = await fetch('/api/show_vouchers')
const data = await response.json()

const container = document.getElementById("voucherContainer")
container.innerHTML=""
allVoucherTotals=[]

if(!data.length){
container.innerHTML="<p>No vouchers found</p>"
document.getElementById("finalTotalBox").innerHTML=""
return
}

/* Group by voucher */
const grouped = {}

data.forEach(row=>{
if(!grouped[row.voucher_id]){
grouped[row.voucher_id]={header:row,items:[]}
}
grouped[row.voucher_id].items.push(row)
})

Object.values(grouped).forEach(voucher=>{

const div=document.createElement("div")
div.className="voucher"

const header=voucher.header

let html=`
<div class="header">
<div>Voucher ID: ${header.voucher_id}</div>
<div>Party: ${header.party_name || '-'}</div>
<div>Received: ${header.received_date || '-'}</div>
<div>Delivery: ${header.delivery_date || '-'}</div>
</div>

<table>
<tr>
<th>Model</th>
<th>PL/DX</th>
<th>LQ/PC</th>
<th>Colour</th>
<th>Qty</th>
<th>Units</th>
</tr>
`

let total=0
let unit=""

voucher.items.forEach((item,index)=>{
total+=Number(item.qty)||0
if(index===0) unit=item.units||""

html+=`
<tr>
<td>${item.model_name||'-'}</td>
<td>${item.pl_dx||'-'}</td>
<td>${item.lq_pc||'-'}</td>
<td>${item.colours||'-'}</td>
<td>${item.qty||0}</td>
<td>${item.units||'-'}</td>
</tr>
`
})

allVoucherTotals.push({total,unit})

html+=`
<tr class="total">
<td colspan="4" style="text-align:right">TOTAL</td>
<td>${total}</td>
<td>${unit}</td>
</tr>
</table>

<div class="actions">
<button class="edit-btn" onclick="editVoucher(${header.voucher_id})">Edit</button>
<button class="delete-btn" onclick="deleteVoucher(${header.voucher_id})">Delete</button>
</div>
`

div.innerHTML=html
container.appendChild(div)

})

/* FINAL GRAND TOTAL */
let grandTotal=0
let unit=""

allVoucherTotals.forEach((v,i)=>{
grandTotal+=v.total
if(i===0) unit=v.unit
})

document.getElementById("finalTotalBox").innerHTML =
"FINAL TOTAL OF ALL VOUCHERS: "+grandTotal+" "+unit

}

/* EDIT */
function editVoucher(id){
window.location="edit_cover.html?id="+id
}

/* DELETE */
function deleteVoucher(id){

if(!confirm("Are you sure you want to delete this voucher?")) return;

fetch('/api/delete_voucher/'+id,{
method:"DELETE"
})
.then(res=>res.json())
.then(response=>{
alert(response.message)
loadVouchers()
})

}

/* MODAL FUNCTIONS */
function openModal(){
document.getElementById("reportModal").style.display="flex"
}

function closeModal(){
document.getElementById("reportModal").style.display="none"
}

function generateReport(){

const from=document.getElementById("fromDate").value
const to=document.getElementById("toDate").value
const type=document.getElementById("reportType").value

if(!from || !to || !type){
alert("Please select all fields")
return
}

closeModal()

if(type==="packing"){
window.location=`packing_report.html?from=${from}&to=${to}`
}
else if(type==="painting"){
window.location=`b.html?from=${from}&to=${to}`
}
else if(type==="powdering"){
window.location=`c.html?from=${from}&to=${to}`
}

}

loadVouchers()

</script>

</body>
</html>
